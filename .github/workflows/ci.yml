name: poc.hello.world CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Step 2 - Set Up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Step 3 - Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Step 4 - Build Project
        run: mvn clean compile -e

      - name: Step 5 - Package JAR (skip tests)
        run: mvn package -DskipTests

      - name: Step 6 - Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: poc-hello-world-jar
          path: target/*.jar